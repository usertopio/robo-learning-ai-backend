name: Backend_CI

on:
  push:
    branches: [main, top, amd]
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run unit tests before building"
        required: true
        type: boolean
        default: true

jobs:
  test:
    runs-on: self-hosted-backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ github.event_name == 'push' || inputs.run_tests == true }}
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"

      - name: Install Dependencies
        if: ${{ github.event_name == 'push' || inputs.run_tests == true }}
        run: npm ci

      - name: Run Tests
        if: ${{ github.event_name == 'push' || inputs.run_tests == true }}
        run: npm test

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            usertopio/robo-learn-ai-backend:latest-amd64-${{ github.ref_name }}
            usertopio/robo-learn-ai-backend:0.0.0-amd64-${{ github.ref_name }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
